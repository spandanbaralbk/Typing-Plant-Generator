<!DOCTYPE html>
<html>
<head>
 
  <title>Typing Plant Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrap">
    <div id="header">
      <h1>Typing Plant Generator</h1>
      <p>Start typing fool dont you want your plant to grow? Type anything below.</p>
    </div>
    <div id="stats">
      <div class="stat">Stems <span id="sc">0</span></div>
      <div class="stat">Leaves <span id="lc">0</span></div>
      <div class="stat">Flowers <span id="fc">0</span></div>
      <div class="stat">Characters <span id="cc">0</span></div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="inputarea">
      <textarea id="typebox" placeholder="Start typing to grow your plant..." autocomplete="off" spellcheck="false"></textarea>
      <div id="hint">Vowels grow flowers. Spaces branch stems. Fast typing stretches leaves.</div>
      <button id="clearbtn">Clear plant</button>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
